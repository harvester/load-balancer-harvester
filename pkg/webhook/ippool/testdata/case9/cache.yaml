apiVersion: loadbalancer.harvesterhci.io/v1beta1
kind: IPPool
metadata:
  name: global
  #labels:
    # The validator does not rely on this label to enforce global pool validity
    # or uniqueness; it uses ipam.IsGlobalIPPool(pool) as the source of truth.
    # Consequently, the presence or absence of this label does not impact
    # validation results.
    # loadbalancer.harvesterhci.io/global-ip-pool: "true"
spec:
  ranges:
    - subnet: 192.168.10.0/24
  selector:
    network: "default/vlan10"
    scope:
      - namespace: "*"
        project: "*"
        guestCluster: "*"