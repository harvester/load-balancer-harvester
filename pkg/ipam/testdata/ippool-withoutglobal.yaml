apiVersion: loadbalancer.harvesterhci.io/v1beta1
kind: IPPool
metadata:
  labels:
    loadbalancer.harvesterhci.io/global-ip-pool: "false"
    loadbalancer.harvesterhci.io/vid: "0"
  name: default
spec:
  ranges:
    - subnet: 172.19.110.192/27
  selector:
    scope:
      - guestCluster: '*'
        namespace: default
        project: '*'
---        
apiVersion: loadbalancer.harvesterhci.io/v1beta1
kind: IPPool
metadata:
  name: default-vlan10
spec:
  ranges:
    - subnet: 172.19.110.192/27
  selector:
    network: default/vlan10
    scope:
      - guestCluster: cluster1
        namespace: default
        project: project1
---
apiVersion: loadbalancer.harvesterhci.io/v1beta1
kind: IPPool
metadata:
  name: default-vlan10-allow-empty
spec:
  ranges:
    - subnet: 172.19.110.192/27
  selector:
    network: default/vlan10
    scope:
      - namespace: default
---
apiVersion: loadbalancer.harvesterhci.io/v1beta1
kind: IPPool
metadata:
  name: default-vlan20
spec:
  ranges:
    - subnet: 172.19.110.192/27
  selector:
    network: default/vlan20
    scope:
      - guestCluster: cluster1
        namespace: default
        project: project1